name: Déclencher la preuve Lighthouse post-merge

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  dispatch-and-record:
    if: github.event.head_commit.message == 'ci: déclencher le workflow_dispatch de clôture'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Déclencher Lighthouse CI et consigner la preuve verte
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const startedAt = Date.now();
            const workflowId = 'lighthouse.yml';

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: workflowId,
              ref: 'main',
              inputs: { baseline_ref: 'main' },
            });

            let run;
            for (let attempt = 0; attempt < 30; attempt += 1) {
              await new Promise((resolve) => setTimeout(resolve, 5000));
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                event: 'workflow_dispatch',
                branch: 'main',
                per_page: 10,
              });
              run = response.data.workflow_runs.find(
                (candidate) =>
                  new Date(candidate.created_at).getTime() >= startedAt - 5000,
              );
              if (run) break;
            }

            if (!run) {
              throw new Error('Le run workflow_dispatch n’a pas été trouvé.');
            }

            for (let attempt = 0; attempt < 80; attempt += 1) {
              const response = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: run.id,
              });
              run = response.data;
              if (run.status === 'completed') break;
              await new Promise((resolve) => setTimeout(resolve, 10000));
            }

            if (run.status !== 'completed' || run.conclusion !== 'success') {
              throw new Error(
                `Le run ${run.html_url} s’est terminé avec ${run.conclusion ?? run.status}.`,
              );
            }

            const path = 'docs/validation/chantier-b-preuves.md';
            const fileResponse = await github.rest.repos.getContent({
              owner,
              repo,
              path,
              ref: 'main',
            });
            const file = fileResponse.data;
            if (Array.isArray(file) || file.type !== 'file') {
              throw new Error('Le registre de preuves est introuvable.');
            }

            const current = Buffer.from(file.content, 'base64').toString('utf8');
            const previous = `- Le déclenchement \`pull_request\` est prouvé par l’exécution ci-dessus. Le
              déclenchement manuel \`workflow_dispatch\` ne peut pas être exécuté avant que le
              workflow existe sur la branche par défaut GitHub. Il reste donc **non prouvé à
              ce stade**, sans incidence sur les mesures produites par le même workflow.`.replace(
                /^ {14}/gm,
                '',
              );
            const replacement = `- Le déclenchement \`pull_request\` est prouvé par l’exécution ci-dessus. Le
              déclenchement manuel \`workflow_dispatch\` est prouvé par
              [Lighthouse CI — run ${run.run_number}](${run.html_url}), exécuté avec succès
              sur la branche \`main\`.`.replace(/^ {14}/gm, '');

            if (!current.includes(previous)) {
              throw new Error(
                'La mention non prouvée attendue n’existe plus dans le registre.',
              );
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch: 'main',
              sha: file.sha,
              message: 'docs: confirmer le workflow_dispatch de clôture',
              content: Buffer.from(current.replace(previous, replacement)).toString(
                'base64',
              ),
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: 10,
              body: `Preuve de clôture : [workflow_dispatch Lighthouse CI run #${run.run_number}](${run.html_url}) terminé avec succès sur \`main\`.`,
            });

            core.summary
              .addHeading('Chantier B clôturé')
              .addLink(
                `Lighthouse CI workflow_dispatch run #${run.run_number}`,
                run.html_url,
              )
              .write();
